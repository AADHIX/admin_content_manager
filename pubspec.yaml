name: flutter_admin_app
description: Admin and User Content Management Application with Firebase

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^2.27.1

  # Firebase Authentication
  firebase_auth: ^4.17.9

  # Cloud Firestore
  cloud_firestore: ^4.15.9

  # Image loading from URL
  cached_network_image: ^3.3.1

  # UI Utilities
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true